name: Jalankan Bash2 untuk M3U8

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'   # setiap 3 jam

jobs:
  run_bash2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo utama
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ambil cookies & url dari repo privat
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.TOKEN_PRIVATE }}@github.com/${{ secrets.REPO_PRIVATE }} private
          cp private/cookies.txt $HOME/cookies.txt
          cp private/urls_live.txt $HOME/urls_live.txt
          cp private/base_api.txt $HOME/base_api.txt

      - name: Jalankan script bash2.sh
        run: |
          chmod +x bash2.sh
          ./bash2.sh

      - name: Commit & Push (ANTI CONFLICT)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Update: $(date)" > .last_bash2

          git add .last_bash2 || true
          git add *.m3u8.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan"
            exit 0
          fi

          git commit -m "Update hasil bash2.sh $(date '+%Y-%m-%d %H:%M:%S')"

          # 🔥 LOOP RETRY (ANTI FAIL)
          for i in 1 2 3; do
            echo "Push attempt $i..."

            # sync dulu
            git pull --rebase origin master || true

            if git push origin HEAD:master; then
              echo "Push berhasil"
              exit 0
            fi

            echo "Push gagal, retry..."
            sleep 5
          done

          echo "Push gagal setelah 3x percobaan"
          exit 1
